<html lang="en">
<head>

<title>ARB SCANNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c10;--card:#0e1419;--border:#1e2d3a;--accent:#00e5ff;--green:#00ff88;--red:#ff3355;--gold:#ffd060;--dim:#3a5060;--text:#c8dce8;--muted:#5a7888}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,.018) 3px,rgba(0,229,255,.018) 4px);pointer-events:none;z-index:9999}
header{border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:4px;color:var(--accent)}
.logo span{color:var(--green)}
.status-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:2px;font-size:10px;letter-spacing:1px;border:1px solid var(--border);color:var(--muted)}
.pill.ok{border-color:rgba(0,255,136,.3);color:var(--green);background:rgba(0,255,136,.05)}
.pill.fail{border-color:rgba(255,51,85,.3);color:var(--red);background:rgba(255,51,85,.05)}
.pill.loading{border-color:rgba(0,229,255,.3);color:var(--accent);background:rgba(0,229,255,.05)}
.refresh-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:6px 14px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:background .15s}
.refresh-btn:hover{background:rgba(0,229,255,.08)}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.br-wrap{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);letter-spacing:1px}
.br-wrap input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 9px;font-family:'Space Mono',monospace;font-size:12px;width:90px;outline:none}
.br-wrap input:focus{border-color:var(--accent)}
.main{padding:20px 24px;max-width:1200px;margin:0 auto}
.sec{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}

#msg{padding:10px 14px;border:1px solid var(--border);color:var(--muted);font-size:11px;margin-bottom:16px;min-height:38px;display:flex;align-items:center;gap:8px;line-height:1.5}
#msg.ok{border-color:rgba(0,255,136,.2);color:var(--green)}
#msg.fail{border-color:rgba(255,51,85,.2);color:var(--red)}
.spin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);overflow:hidden;animation:fu .3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:#2a3f50}
.ch{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}

.cb{padding:12px 14px}
.legs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.leg{background:var(--bg);border:1px solid var(--border);padding:9px 10px}

.ls{font-size:10px;color:var(--dim);margin-bottom:4px}
.lo{font-size:18px;font-weight:700;line-height:1;margin-bottom:2px}
.lo.yes{color:var(--green)}.lo.no{color:var(--red)}
.lc{font-size:9px;color:var(--muted);margin-bottom:6px}

.ll{color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.lv{font-weight:700}.lv.hi{color:var(--green)}.lv.med{color:var(--gold)}.lv.lo{color:var(--red)}
.lt{height:2px;background:#1a2530;margin-bottom:6px}
.lf{height:100%}.lf.hi{background:var(--green)}.lf.med{background:var(--gold)}.lf.lo{background:var(--red)}
.lw{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;margin-top:4px;border:1px solid rgba(255,51,85,.25);color:var(--red);background:rgba(255,51,85,.05)}

.cf b{color:var(--green)}
.empty{grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:2px}

<header>
  <div class="logo">ARB<span>SCOPE</span></div>

<script>
// Both APIs are public REST APIs with CORS headers — no auth needed
// corsproxy.io forwards requests and adds Access-Control-Allow-Origin: *



async function getDirect(url) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 10000);
  try {
    const r = await fetch(url, {signal: ctrl.signal});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  } finally { clearTimeout(t); }
}

const WORKER = 'https://arbscope.jbuckets1519.workers.dev';

async function fetchKalshi() {
  const j = await fetch(WORKER + '?source=kalshi').then(r => r.json());
  const all = j.markets || [];
  return all.map(m => {
    // Compose full title: "Series Title: Contract Title" when they differ
    const series = m.series_title || m.event_title || '';
    const contract = m.title || m.subtitle || '';
    const fullTitle = (series && contract && series !== contract)
      ? series + ': ' + contract
      : contract || series;
    return {
      id: m.ticker,
      title: fullTitle,
      shortTitle: contract,
      seriesTitle: series,
      yes_ask: m.yes_ask != null ? m.yes_ask : (m.no_bid != null ? 100 - m.no_bid : null),
      no_ask:  m.no_ask  != null ? m.no_ask  : (m.yes_bid != null ? 100 - m.yes_bid : null),
      open_interest: m.open_interest || 0,
      volume: m.volume || 0,
    };
  });
}

async function fetchPolymarket() {
  const j = await fetch(WORKER + '?source=polymarket').then(r => r.json());
  const all = j.markets || [];
  const result = [];
  for (const m of all) {
    let prices = [], outcomes = [];
    try { prices = JSON.parse(m.outcomePrices||'[]'); } catch{}
    try { outcomes = JSON.parse(m.outcomes||'[]'); } catch{}
    const liq = parseFloat(m.liquidity||m.liquidityNum||0);
    const vol = parseFloat(m.volume||m.volumeNum||0);

    if (outcomes.length > 2 && prices.length === outcomes.length) {
      // Multi-outcome market — create one entry per outcome
      for (let i = 0; i < outcomes.length; i++) {
        const yes = Math.max(0.01, Math.min(0.99, parseFloat(prices[i])||0.01));
        result.push({
          id: (m.conditionId||m.id||'') + '_' + i,
          title: (m.question||m.title||'') + ': ' + outcomes[i],
          yes_ask: Math.round(yes*100),
          no_ask:  Math.round((1-yes)*100),
          liquidity: liq / outcomes.length,
          volume: vol,
        });
      }
    } else {
      // Binary market
      const yes = Math.max(0.01, Math.min(0.99, parseFloat(prices[0])||0.5));
      result.push({
        id: m.conditionId||m.id||'', title: m.question||m.title||'',
        yes_ask: Math.round(yes*100),
        no_ask:  Math.round((1-yes)*100),
        liquidity: liq,
        volume: vol,
      });
    }
  }
  return result;
}

function cleanTitle(s) {
  // Strip leading "yes X, yes Y, yes Z" list patterns down to just the last meaningful part
  s = s.replace(/^(yes |no )/i, '');
  // Replace ",yes " and ",no " separators with " / "
  s = s.replace(/,(yes |no )/gi, ' / ');
  // Capitalize first letter
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// Entity normalization — maps aliases to canonical names
const ALIASES = {
  // NBA teams
  'okc':'thunder','oklahoma':'thunder','oklahoma city':'thunder',

  'sga':'gilgeous-alexander','shai':'gilgeous-alexander',

  'mvp':'mvp','most valuable player':'mvp',

};

function normalize(s) {
  s = s.toLowerCase().replace(/[^a-z0-9 ]/g,' ');
  // Replace multi-word aliases first (longest first)
  const sorted = Object.keys(ALIASES).sort((a,b)=>b.length-a.length);
  for (const alias of sorted) {
    s = s.replace(new RegExp('\\b'+alias+'\\b','g'), ALIASES[alias]);
  }
  return s;
}

function tokens(s) {
  const stop = new Set(['will','the','who','win','wins','a','an','in','of','to','be','for','on','at','2024','2025','2026','nba','nfl','mlb','nhl','does','did','get','this','that','are','was']);
  return normalize(s).split(/\s+/).filter(w=>w.length>1&&!stop.has(w));
}

function normalize(s) {
  return (s||'').toLowerCase()
    .replace(/will the |will |who will |the |win the |win |winner\??/g, '')
    .replace(/pro basketball|pro football|pro baseball|pro hockey/gi, '')
    .replace(/(nba|nfl|nhl|mlb)/gi, '')
    .replace(/championship|champions/gi, 'champion')
    .replace(/finals?/gi, 'final')
    .replace(/playoffs?/gi, 'playoff')
    .replace(/super bowl/gi, 'superbowl')
    .replace(/world series/gi, 'worldseries')
    .replace(/stanley cup/gi, 'stanleycup')
    .replace(/world cup/gi, 'worldcup')
    .replace(/most valuable player/gi, 'mvp')
    .replace(/rookie of the year/gi, 'roty')
    .replace(/defensive player of the year/gi, 'dpoy')
    .replace(/most improved player/gi, 'mip')
    .replace(/sixth man of the year/gi, 'sixthman')
    .replace(/clutch player of the year/gi, 'clutchpoy')
    .replace(/coach of the year/gi, 'coty')
    .replace(/2025-26|2025|2026|2027/g, '')
    .replace(/oklahoma city|okc/g, 'thunder')
    .replace(/golden state/g, 'warriors')
    .replace(/los angeles lakers|la lakers/g, 'lakers')
    .replace(/los angeles clippers|la clippers/g, 'clippers')
    .replace(/new york knicks/g, 'knicks')
    .replace(/san antonio/g, 'spurs')
    .replace(/new orleans/g, 'pelicans')
    .replace(/portland trail blazers/g, 'trailblazers')
    .replace(/[^a-z0-9]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

// Extract last name(s) from a string for player matching
function extractNames(s) {
  const sl = (s||'').toLowerCase();
  // Common player last names — add more as needed
  const names = ['edwards','gilgeous-alexander','gilgeous','tatum','curry','lebron','james',
    'jokic','embiid','giannis','antetokounmpo','davis','durant','harden','westbrook',
    'lillard','mitchell','booker','maxey','brunson','fox','cunningham','wembanyama',
    'flagg','ivey','holmgren','chet','sga','ant','anthony','tyrese','jayson','jaylen',
    'brown','morant','ja','zion','williamson','doncic','luka','towns','karl','kd','cp3',
    'paul','beal','lavine','zach','demar','derozan','vucevic','nikola'];
  return names.filter(n => sl.includes(n));
}

function matchScore(a, b) {
  const na = normalize(a), nb = normalize(b);
  if (na === nb) return 1;

  // If either string has a player name, both must share at least one name
  const namesA = extractNames(a), namesB = extractNames(b);
  if (namesA.length > 0 || namesB.length > 0) {
    const sharedNames = namesA.filter(n => namesB.includes(n));
    if (sharedNames.length === 0) return 0; // different players — no match
  }

  const wa = new Set(na.split(' ').filter(w => w.length > 2));
  const wb = new Set(nb.split(' ').filter(w => w.length > 2));
  let shared = 0;
  for (const w of wa) if (wb.has(w)) shared++;
  const total = Math.max(wa.size, wb.size);
  return total > 0 ? shared / total : 0;
}

async function findArbs(K, P) {
  const SPORTS = /nba|nfl|nhl|mlb|nascar|mma|ufc|soccer|tennis|golf|ncaa|champion|final|playoff|super bowl|world series|stanley cup|world cup|title|mvp|rookie|draft/i;
  const Psports = P.filter(m => SPORTS.test(m.title||''));

  const matches = [];
  for (let ki = 0; ki < K.length; ki++) {
    let bestScore = 0.35, bestPi = -1;
    for (let pi = 0; pi < Psports.length; pi++) {
      const score = matchScore(K[ki].title, Psports[pi].title);
      if (score > bestScore) { bestScore = score; bestPi = pi; }
    }
    if (bestPi >= 0) matches.push({k: ki, pm: Psports[bestPi]});
  }
  console.log('Keyword matches:', matches.length, '| Kalshi:', K.length, '| PolySports:', Psports.length);
  // Log first 10 Kalshi titles so we can see structure
  console.log('Sample Kalshi titles:', K.slice(0,10).map(m=>m.title));
  // Log matched pairs
  matches.slice(0,5).forEach(({k,pm}) => console.log('PAIR:', K[k].title, '<=>', pm.title));
  // Log first few matches for debugging
  matches.slice(0,3).forEach(({k,pm}) => {
    console.log('MATCH:', K[k].title, '| yes_ask:', K[k].yes_ask, '| no_ask:', K[k].no_ask, '=> POLY:', pm.title, '| yes_ask:', pm.yes_ask, '| no_ask:', pm.no_ask);
  });

  const arbs = [];
  for (const {k, pm} of matches) {
    const km = K[k];

function am(c){ const p=c/100; if(p<=0||p>=1) return '--'; return p<0.5?'+'+Math.round(100/p-100):''+Math.round(-p*100/(1-p)); }
function fm(n){ return n>=1000?'$'+(n/1000).toFixed(1)+'k':'$'+Math.round(n); }
function lc(n){ return n>=5000?'hi':n>=500?'med':'lo'; }

function card(arb, br, i) {
  const s1=br*arb.p1/(arb.p1+arb.p2), s2=br*arb.p2/(arb.p1+arb.p2);
  const profit=(br*arb.pct/100).toFixed(2);
  function leg(l,s) {
    const c=lc(l.liq), fp=Math.min(100,l.liq/20000*100).toFixed(1);
    const w=l.liq<500?'<div class="lw">&#9888; VERY THIN &mdash; ~'+fm(l.liq)+' available</div>':
             l.liq<5000?'<div class="lw med">&#9651; THIN &mdash; ~'+fm(l.liq)+' available</div>':''  ;
    return `<div class="leg">
      <div class="lb">${l.src}</div><div class="ls">${l.side}</div>
      <div class="lo ${l.side.toLowerCase()}">${am(l.ask)}</div>
      <div class="lc">${l.ask}&cent;</div>
      <div class="lsk">Stake: $${s.toFixed(2)}</div>
      <div class="liq"><div class="lr"><span class="ll">Liquidity</span><span class="lv ${c}">${fm(l.liq)}</span></div>
      <div class="lt"><div class="lf ${c}" style="width:${fp}%"></div></div>${w}</div>
    </div>`;
  }
  const d=document.createElement('div');
  d.className='card'; d.style.animationDelay=(i*.05)+'s';
  d.innerHTML=`<div class="ch">
    <div style="flex:1;min-width:0;overflow:hidden">
      <div class="ct">${cleanTitle(arb.ktitle)}</div>
      <div style="font-size:9px;color:#3a6878;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">POLY: ${cleanTitle(arb.ptitle)}</div>
    </div>
    <div class="cp">+${arb.pct.toFixed(2)}%</div></div>
  <div class="cb"><div class="legs">${leg(arb.l1,s1)}${leg(arb.l2,s2)}</div>
  <div class="cf"><span>Implied total: <b>${arb.total}&cent;</b></span><span>Profit on $${br.toLocaleString()}: <b>$${profit}</b></span></div></div>`;
  return d;
}

let lastArbs = [];
async function run() {
  const btn=document.getElementById('rbtn'); btn.disabled=true;
  const br=parseFloat(document.getElementById('br').value)||1000;
  document.getElementById('grid').innerHTML='';
  document.getElementById('sec').textContent='Scanning';
  document.getElementById('pk').className='pill loading'; document.getElementById('pk').textContent='KALSHI…';
  document.getElementById('pp').className='pill loading'; document.getElementById('pp').textContent='POLYMARKET…';
  document.getElementById('msg').className='';
  document.getElementById('msg').innerHTML='<div class="spin"></div> Fetching Kalshi + Polymarket&hellip;';

  const [kr,pr] = await Promise.allSettled([fetchKalshi(), fetchPolymarket()]);
  const kok=kr.status==='fulfilled', pok=pr.status==='fulfilled';

  document.getElementById('pk').className='pill '+(kok?'ok':'fail');
  document.getElementById('pk').textContent=kok?'KALSHI ✓ ('+kr.value.length+')':'KALSHI ✗';
  document.getElementById('pp').className='pill '+(pok?'ok':'fail');
  document.getElementById('pp').textContent=pok?'POLYMARKET ✓ ('+pr.value.length+')':'POLYMARKET ✗';

  if (!kok||!pok) {
    const e=(!kok?'Kalshi: '+kr.reason?.message+' | ':'')+(!pok?'Poly: '+pr.reason?.message:'');
    document.getElementById('msg').className='fail';
    document.getElementById('msg').innerHTML='&#10007; '+e;
    btn.disabled=false; return;
  }

  const arbs=await findArbs(kr.value, pr.value);
  lastArbs=arbs;
  const grid=document.getElementById('grid');
  document.getElementById('sec').textContent=arbs.length+' opportunities';
  if (!arbs.length) {
    document.getElementById('msg').className='ok';
    document.getElementById('msg').textContent='&#10003; '+kr.value.length+' Kalshi + '+pr.value.length+' Polymarket markets loaded — no arbs above 0.3% found';
    grid.innerHTML='<div class="empty">NO ARBITRAGE OPPORTUNITIES<br><br>Markets are efficiently priced.</div>';
  } else {
    document.getElementById('msg').className='ok';
    document.getElementById('msg').textContent='&#10003; '+arbs.length+' arbs found';
    arbs.forEach((a,i)=>grid.appendChild(card(a,br,i)));
  }
  btn.disabled=false;
}

document.getElementById('br').addEventListener('change',()=>{
  if (!lastArbs.length) return;
  const br=parseFloat(document.getElementById('br').value)||1000;
  const g=document.getElementById('grid'); g.innerHTML='';
  lastArbs.forEach((a,i)=>g.appendChild(card(a,br,i)));
});

run();
</script>
</body>
</html>
